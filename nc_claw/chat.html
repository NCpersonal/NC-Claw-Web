<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw</title>
    <link rel="stylesheet" href="/chat.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐾</span>
                    <span class="logo-text">Claw</span>
                </div>
                <span class="version" id="version">v0.0.0</span>
            </div>
            <div class="sidebar-section">
                <div class="section-title">Mode</div>
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="default" onclick="switchMode('default')" title="Default chat" aria-label="Default chat">
                        <span class="mode-dot"></span> Chat
                    </button>
                    <button class="mode-tab" data-mode="agent" onclick="switchMode('agent')" title="Agent chat" aria-label="Agent chat">
                        <span class="mode-dot"></span> Agents
                    </button>
                    <button class="mode-tab" data-mode="group" onclick="switchMode('group')" title="Group chat" aria-label="Group chat">
                        <span class="mode-dot"></span> Groups
                    </button>
                </div>
            </div>
            <div class="sidebar-section" id="agent-list-section" style="display:none">
                <div class="section-title">Agents</div>
                <div class="entity-list" id="agent-list"></div>
            </div>
            <div class="sidebar-section" id="group-list-section" style="display:none">
                <div class="section-title">Groups</div>
                <div class="entity-list" id="group-list"></div>
            </div>
            <div class="sidebar-section">
                <div class="section-title">Skills</div>
                <div class="entity-list" id="skill-list"></div>
            </div>
            <div class="sidebar-footer">
                <div class="status-bar">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="token-bar">
                    <span id="token-usage">0 tokens</span>
                </div>
            </div>
        </aside>
        <main class="main">
            <div class="main-header">
                <button class="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
                <div class="chat-title" id="chat-title">Claw</div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="clearChat()" title="Clear" aria-label="Clear chat">🗑</button>
                    <button class="icon-btn" onclick="location.reload()" title="Refresh" aria-label="Refresh">↻</button>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="welcome">
                    <div class="welcome-icon">🐾</div>
                    <div class="welcome-title">Claw Terminal AI</div>
                    <div class="welcome-sub">Multi-Agent · Group Chat · Commands</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrap">
                    <textarea id="input" placeholder="Type a message..." rows="1"
                              onkeydown="handleKey(event)" aria-label="Message input"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send" aria-label="Send message">
                        <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Enter to send · Shift+Enter for newline</div>
            </div>
        </main>
    </div>

    <!-- JS Libraries: Use jsdelivr for better China access -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
    <script src="/chat.js"></script>
</body>
</html>
